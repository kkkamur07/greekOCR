defaults:
  - _self_

data:
  pack_dir: data/calamari_pack_greek

model:
  network: def
  warmstart_checkpoint: outputs/calamari-greek-bible/best.ckpt

training:
  epochs: 100
  learning_rate: 0.0001
  n_augmentations: 5
  early_stopping_patience: 20
  early_stopping_frequency: 1
  gpu: 0

output:
  root: outputs/calamari-greek-finetune

wandb:
  enabled: false
  project: calamari-finetune
  entity: null
  name: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
