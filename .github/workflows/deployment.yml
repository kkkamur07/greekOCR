name: Deployment and Images

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-and-docker:
    name: Platform bundle, image, and supply-chain checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: bash deploy/platform/build.sh
      - run: test -f deploy/platform/nomicous/backend/core/app.py
      - run: test -f deploy/platform/inference/contracts/__init__.py
      - run: test -f deploy/platform/inference/admission.py
      - run: test -f deploy/platform/inference/infrastructure/settings.py
      - name: Verify platform contract import surface
        run: |
          PYTHONPATH=deploy/platform uv run --locked --group platform python -c \
            "from inference.contracts.jobs import JobCallbackRequest; assert JobCallbackRequest"
      - run: docker build --target runtime --tag nomicous-api:ci -f nomicous/Dockerfile .
      - run: docker build --target builder -f nomicous/frontend/Dockerfile nomicous
      - run: docker build --target runtime --tag nomicous-inference:ci -f inference/Dockerfile .
      - name: Verify runtime users and import surfaces
        run: |
          test "$(docker run --rm --entrypoint id nomicous-api:ci -u)" != "0"
          test "$(docker run --rm --entrypoint id nomicous-inference:ci -u)" != "0"
          docker run --rm --entrypoint python nomicous-api:ci -c "from backend.core.main import app; assert app.title"
          docker run --rm --entrypoint python nomicous-inference:ci -c "from inference.api.main import app; assert app.title"
      - name: Verify health checks and minimal Hub resolver image content
        run: |
          docker image inspect nomicous-api:ci --format '{{json .Config.Healthcheck}}' | jq -e '.Test | length > 0'
          docker image inspect nomicous-inference:ci --format '{{json .Config.Healthcheck}}' | jq -e '.Test | length > 0'
          docker run --rm --entrypoint sh nomicous-inference:ci -c '
            test -f /app/src/hf/resolve/cache.py
            test ! -e /app/src/hf/cache/syriac-calamari-v1/stable/best.pt
            test ! -d /app/src/hf/local
            test ! -d /app/src/hf/staging
            test ! -d /app/src/hf/publish
          '
      - name: Generate API image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: nomicous-api:ci
          format: spdx-json
          output-file: sbom/nomicous-api.spdx.json
          artifact-name: nomicous-api-sbom
          upload-artifact: false
      - name: Generate inference image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: nomicous-inference:ci
          format: spdx-json
          output-file: sbom/nomicous-inference.spdx.json
          artifact-name: nomicous-inference-sbom
          upload-artifact: false
      - name: Scan API image vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.36.0
        with:
          image-ref: nomicous-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Scan inference image vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.36.0
        with:
          image-ref: nomicous-inference:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Upload image SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: image-sboms-${{ github.sha }}
          path: sbom/*.spdx.json
          if-no-files-found: error
          overwrite: false
          retention-days: 30
