name: Release Inference Helper

# Builds the native Inference Helper installers on each OS's own runner
# (PyInstaller cannot cross-compile) and uploads the artifacts to the
# matching, already-published GitHub Release. Trigger by publishing a release
# for an `inference-helper-v*` tag or manually against an existing release tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach artifacts to (e.g. inference-helper-v0.1.1)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-helper-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: startsWith(github.event.inputs.tag || github.event.release.tag_name, 'inference-helper-v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: nomicous-inference-helper-macos.dmg
            build: bash packaging/helper/macos/build-dmg.sh
          - os: ubuntu-latest
            artifact: nomicous-inference-helper-linux.tar.gz
            build: bash packaging/helper/linux/build-tarball.sh
          - os: windows-latest
            artifact: nomicous-inference-helper-windows.zip
            build: powershell -ExecutionPolicy Bypass -File packaging/helper/windows/build-installer.ps1
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Build installer
        shell: bash
        run: ${{ matrix.build }}

      - name: Verify artifact exists
        shell: bash
        run: |
          test -f "packaging/helper/dist/${{ matrix.artifact }}" \
            || { echo "Missing packaging/helper/dist/${{ matrix.artifact }}"; ls -la packaging/helper/dist || true; exit 1; }

      - name: Create artifact checksum
        shell: bash
        run: |
          python - "${{ matrix.artifact }}" <<'PY'
          from hashlib import sha256
          from pathlib import Path
          import sys

          artifact = Path("packaging/helper/dist") / sys.argv[1]
          digest = sha256(artifact.read_bytes()).hexdigest()
          (artifact.parent / f"{artifact.name}.sha256").write_text(
              f"{digest}  {artifact.name}\n",
              encoding="utf-8",
          )
          PY

      - name: Attest installer provenance
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: packaging/helper/dist/${{ matrix.artifact }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: helper-${{ matrix.artifact }}-${{ github.run_id }}
          path: |
            packaging/helper/dist/${{ matrix.artifact }}
            packaging/helper/dist/${{ matrix.artifact }}.sha256
          if-no-files-found: error
          overwrite: false
          retention-days: 14

  release:
    name: Verify and publish immutable release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download immutable installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: helper-*-${{ github.run_id }}
          path: release-assets
          merge-multiple: true
      - name: Verify checksums and consolidate manifest
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path("release-assets")
          assets = sorted(
              path
              for path in root.iterdir()
              if path.is_file() and not path.name.endswith(".sha256")
          )
          if len(assets) != 3:
              raise SystemExit(f"expected three installer assets, found: {[path.name for path in assets]}")
          lines = []
          for asset in assets:
              expected = (asset.parent / f"{asset.name}.sha256").read_text(encoding="utf-8").strip()
              actual = f"{sha256(asset.read_bytes()).hexdigest()}  {asset.name}"
              if expected != actual:
                  raise SystemExit(f"checksum mismatch for {asset.name}")
              lines.append(actual)
          (root / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: packaging/helper
          format: spdx-json
          output-file: release-assets/nomicous-inference-helper.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Scan helper release inputs
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.36.0
        with:
          scan-type: fs
          scan-ref: packaging/helper
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Publish without replacing existing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null
          gh release upload "$RELEASE_TAG" release-assets/*
