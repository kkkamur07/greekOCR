services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: kalamos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kalamos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: annote-api:${ANNOTE_VERSION:-0.3.3}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${ANNOTE_VERSION:-0.3.3}
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:dev@db:5432/kalamos
      SYNC_DATABASE_URL: postgresql://postgres:dev@db:5432/kalamos
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MEDIA_ROOT: /app/backend/media
      ML_SERVICE_URL: http://ml-api:8001
      ML_WEBHOOK_SECRET: dev-ml-webhook-secret
    volumes:
      - ./backend/media:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
      ml-api:
        condition: service_started
    command: >
      sh -c "alembic -c infrastructure/alembic.ini upgrade head &&
             uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 --workers 1"

  ml-api:
    build:
      context: ..
      dockerfile: ml/Dockerfile
    ports:
      - "8001:8001"
    environment:
      ML_REGISTRY_PATH: /app/ml/registry.yaml
      ML_WEIGHTS_CACHE_DIR: /app/ml/weights/cache
    volumes:
      - ../ml/weights:/app/ml/weights
    depends_on:
      db:
        condition: service_healthy
    command: >
      uvicorn ml.api.main:app --host 0.0.0.0 --port 8001 --workers 1

  ml-worker:
    build:
      context: ..
      dockerfile: ml/Dockerfile
    environment:
      ML_REGISTRY_PATH: /app/ml/registry.yaml
      ML_WEIGHTS_CACHE_DIR: /app/ml/weights/cache
    volumes:
      - ../ml/weights:/app/ml/weights
    depends_on:
      ml-api:
        condition: service_started
    command: python -m ml.jobs.worker


  frontend:
    image: annote-frontend:${ANNOTE_VERSION:-0.3.3}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        APP_VERSION: ${ANNOTE_VERSION:-0.3.3}
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
