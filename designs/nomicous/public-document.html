<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MS Or. 1445 — Genesis · Public · Nomicous</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body class="page">

  <nav class="topnav" aria-label="Main navigation">
    <a href="projects.html" class="topnav-logo" aria-label="nomicous home">
      <img src="../assets/nomos.svg" alt="" />
      <span>nomicous</span>
    </a>
    <div class="topnav-sep" aria-hidden="true"></div>
    <div class="topnav-breadcrumb">
      <span class="current" aria-current="page">Public view</span>
    </div>
    <div class="topnav-spacer"></div>
    <div class="topnav-actions">
      <a href="document-detail.html" class="btn btn-outline btn-sm">Editor</a>
      <a href="login.html" class="btn btn-ghost btn-sm">Sign in</a>
    </div>
  </nav>

  <header class="pub-header">
    <div class="pub-header__main">
      <div class="flex items-center gap-2">
        <h1>MS Or. 1445 — Genesis</h1>
        <span class="badge badge-published">published</span>
      </div>
      <p class="meta">3 pages · Page 1: 28 lines · 84 lines total</p>
    </div>
    <div class="pub-downloads">
      <div class="pub-downloads__actions">
        <button type="button" class="btn btn-outline btn-sm btn--on" aria-pressed="true">Hide PDF</button>
        <button type="button" class="btn btn-outline btn-sm">Download PDF</button>
        <button type="button" class="btn btn-outline btn-sm">Download PAGE XML</button>
      </div>
      <div class="pub-pdf-preview" aria-label="Transcription PDF preview">
        <object data="../assets/nomos.svg" type="application/pdf" title="Transcription PDF preview" class="pub-pdf-preview__frame">
          <p class="text-sm text-muted">Your browser cannot display PDFs inline. Use Download PDF instead.</p>
        </object>
      </div>
    </div>
  </header>

  <div class="pub-tabs-wrap">
    <div class="tabs" role="tablist" aria-label="Document pages">
      <button type="button" class="tab active" role="tab" id="tab-1" aria-selected="true" aria-controls="panel-1">Page 1</button>
      <button type="button" class="tab" role="tab" id="tab-2" aria-selected="false" aria-controls="panel-2" tabindex="-1">Page 2</button>
      <button type="button" class="tab" role="tab" id="tab-3" aria-selected="false" aria-controls="panel-3" tabindex="-1">Page 3</button>
    </div>
  </div>

  <main class="content-wrap">
    <div class="pub-split">
      <div class="pub-canvas" role="img" aria-label="Manuscript page 1">
        <img src="../assets/nomos.svg" alt="" aria-hidden="true" />
        <p>Manuscript image with line overlays</p>
        <p class="text-muted text-sm">Click a line region to read transcription</p>
      </div>

      <aside class="pub-transcript" aria-labelledby="transcript-heading">
        <h2 class="pub-transcript__heading" id="transcript-heading">Line 1</h2>
        <button type="button" class="text-block text-block--interactive text-block--selected" aria-pressed="true" lang="syr">ܒܪܫܝܬ ܒܪܐ ܐܠܗܐ ܝܬ ܫܡܝܐ ܘܝܬ ܐܪܥܐ</button>
        <button type="button" class="text-block text-block--interactive" aria-pressed="false" lang="syr">ܘܐܪܥܐ ܗܘܬ ܬܘܗܘ ܘܒܘܗܘ ܘܚܫܘܟܐ ܥܠ ܐܦܝ ܬܗܘܡܐ</button>
        <button type="button" class="text-block text-block--interactive" aria-pressed="false" lang="syr">ܘܪܘܚܐ ܕܐܠܗܐ ܡܪܚܦܐ ܥܠ ܐܦܝ ܡܝܐ</button>

        <p class="pub-transcript__hint">28 lines on this page</p>
      </aside>
    </div>
  </main>

  <script>
    const tabs = document.querySelectorAll('[role="tab"]');
    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((t) => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
          t.tabIndex = -1;
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        tab.tabIndex = 0;
      });
      tab.addEventListener('keydown', (e) => {
        const i = Array.from(tabs).indexOf(tab);
        let next = i;
        if (e.key === 'ArrowRight') next = (i + 1) % tabs.length;
        else if (e.key === 'ArrowLeft') next = (i - 1 + tabs.length) % tabs.length;
        else if (e.key === 'Home') next = 0;
        else if (e.key === 'End') next = tabs.length - 1;
        else return;
        e.preventDefault();
        tabs[next].click();
        tabs[next].focus();
      });
    });
  </script>
</body>
</html>
