<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Nomicous</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <div class="auth-page">
    <aside class="auth-brand" aria-label="About nomicous">
      <a href="../index.html" class="auth-brand-logo" aria-label="nomicous home">
        <img src="../assets/nomos.svg" alt="" />
        <span>nomicous</span>
      </a>
      <div class="auth-brand-body">
        <h2>Nomicous platform for HTR</h2>
        <p>Segment pages, run multiple HTR models, and review transcriptions in one editor. Publish live public pages when a document is ready.</p>
      </div>
      <div class="auth-brand-footer">
        <p>© nomicous 2026</p>
      </div>
    </aside>

    <main class="auth-panel">
      <div class="auth-form-wrap">
        <a class="mobile-logo auth-brand-logo" href="../index.html" aria-label="nomicous home">
          <img src="../assets/nomos.svg" alt="" />
          <span>nomicous</span>
        </a>
        <h1>Sign in</h1>
        <p class="auth-sub">Your workspace</p>
        <form action="#" method="post">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@institution.edu" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-4">Sign in</button>
        </form>
        <p class="auth-footer-link">No account? <a href="register.html">Register</a></p>
      </div>
    </main>
  </div>
  <nav class="page-nav" aria-label="Design navigation">
    <a href="register.html">Register</a>
    <span class="dot">·</span>
    <a href="../index.html">Gallery</a>
  </nav>
</body>
</html>
