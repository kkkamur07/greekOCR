[project]
name = "greekocr"
version = "0.1.0"
description = "OCR and processing for Greek documents"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.4",
    "opencv-python>=4.13.0.92",
]

[project.optional-dependencies]
platform = [
    "alembic>=1.14.0",
    "asyncpg>=0.30.0",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "passlib[bcrypt]>=1.7.4",
    "psycopg2-binary>=2.9.10",
    "pydantic-settings>=2.6.0",
    "pydantic>=2.10.0",
    "python-jose[cryptography]>=3.3.0",
    "python-multipart>=0.0.18",
    "sqlalchemy[asyncio]>=2.0.36",
    "uvicorn[standard]>=0.32.0",
]
dev = [
    "greekocr[platform]",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
]
# Matches ``POST /api/binarize`` (Kraken ``nlbin``); pulls scipy and related stacks.
kraken = ["kraken>=7.0"]
# TrOCR fine-tuning (``python ocr/train_bible.py``).
train = [
    "accelerate>=0.26.0",
    "jiwer>=3.0.0",
    "pillow>=10.0.0",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "transformers>=4.40.0",
]
calamari = ["calamari-ocr>=3.0.0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = ["integration: requires Postgres"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend", "infrastructure"]
