[project]
name = "greekocr"
version = "0.1.0"
description = "OCR and processing for Greek documents"
requires-python = ">=3.11"
# Core OCR/pipeline deps — install with: uv pip install -r requirements.txt (legacy) or uv sync
dependencies = [
    "numpy>=1.24.4",
    "opencv-python>=4.13.0.92",
]

[project.optional-dependencies]
# Platform API deps: requirements-platform.txt (do not pip install -e this repo)
kraken = ["kraken>=7.0"]
train = [
    "accelerate>=0.26.0",
    "jiwer>=3.0.0",
    "pillow>=10.0.0",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "transformers>=4.40.0",
]
calamari = ["calamari-ocr>=3.0.0"]

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = ["integration: requires Postgres"]
