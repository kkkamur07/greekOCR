[project]
name = "greekocr"
version = "0.1.0"
description = "OCR and processing for Greek documents"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24.4",
    "opencv-python>=4.13.0.92",
]

[project.optional-dependencies]
kraken = ["kraken>=7.0"]
train = [
    "accelerate>=0.26.0",
    "jiwer>=3.0.0",
    "pillow>=10.0.0",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "transformers>=4.40.0",
]
calamari = ["calamari-ocr>=2.0.0"]

[dependency-groups]
# Annote platform API + Postgres + tests (deps only — repo is not installed as a package)
platform = [
    "alembic>=1.14.0",
    "asyncpg>=0.30.0",
    "fastapi>=0.115.0",
    "httpx>=0.28.0",
    "bcrypt>=4.2.0",
    "email-validator>=2.2.0",
    "psycopg2-binary>=2.9.10",
    "pydantic-settings>=2.6.0",
    "pydantic>=2.10.0",
    "python-jose[cryptography]>=3.3.0",
    "python-multipart>=0.0.18",
    "sqlalchemy[asyncio]>=2.0.36",
    "uvicorn[standard]>=0.32.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "pypdf>=6.13.2",
]

[tool.uv]
package = false
# ML extras pull incompatible stacks (e.g. kraken vs calamari); resolve separately.
conflicts = [
    [{ extra = "kraken" }, { extra = "calamari" }],
    [{ extra = "kraken" }, { extra = "train" }],
    [{ extra = "calamari" }, { extra = "train" }],
]

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
testpaths = ["annote/backend/tests/platform"]
markers = ["integration: requires Postgres"]
