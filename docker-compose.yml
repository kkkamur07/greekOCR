services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: greekocr
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greekocr"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:dev@db:5432/greekocr
      SYNC_DATABASE_URL: postgresql://postgres:dev@db:5432/greekocr
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MEDIA_ROOT: /app/backend/media
    volumes:
      - ./backend/media:/app/backend/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 --workers 1"

volumes:
  postgres_data:
