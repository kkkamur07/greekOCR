name: nomicous

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: kalamos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kalamos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: nomicous/Dockerfile
      args:
        APP_VERSION: ${NOMICOUS_VERSION:-0.3.3}
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:dev@db:5432/kalamos
      SYNC_DATABASE_URL: postgresql://postgres:dev@db:5432/kalamos
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MEDIA_ROOT: /app/backend/media
      NOMICOUS_APP_ROOT: /app
      INFERENCE_URL: http://inference-api:8001
      INFERENCE_WEBHOOK_SECRET: dev-inference-webhook-secret
      ANNOTATED_DATA_ROOT: /data/annotated/data
    volumes:
      - ./nomicous/backend/media:/app/backend/media
      - ./nomicous/backend:/app/backend
      - ./scripts/platform:/app/scripts/platform
      - ./inference:/app/inference
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      inference-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s
    command: >
      sh -c "alembic -c infrastructure/alembic.ini upgrade head
      && python scripts/platform/seed_dev_nomicous.py
      && uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload --reload-dir /app/backend"
    # Seed runs on API container start only (never restarts Postgres). If you wipe or
    # recreate the DB volume while the API keeps running, hit /health or restart api —
    # development health checks recreate the dev login user when it is missing.

  inference-api:
    image: nomicous-inference:latest
    build:
      context: .
      dockerfile: inference/Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:dev@db:5432/kalamos
      INFERENCE_CALLBACK_URL: http://api:8000/internal/inference/job-complete
      INFERENCE_REGISTRY_PATH: /app/inference/registry.yaml
      INFERENCE_WEBHOOK_SECRET: dev-inference-webhook-secret
      INFERENCE_WEIGHTS_CACHE_DIR: /app/inference/weights/cache
      INFERENCE_CALAMARI_NUM_PROCESSES: "1"
    volumes:
      - ./inference/weights:/app/inference/weights
      - ./src/hf:/app/src/hf
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    command: uvicorn inference.api.main:app --host 0.0.0.0 --port 8001 --workers 1

  inference-worker:
    image: nomicous-inference:latest
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://postgres:dev@db:5432/kalamos
      INFERENCE_CALLBACK_URL: http://api:8000/internal/inference/job-complete
      INFERENCE_REGISTRY_PATH: /app/inference/registry.yaml
      INFERENCE_WEBHOOK_SECRET: dev-inference-webhook-secret
      INFERENCE_WEIGHTS_CACHE_DIR: /app/inference/weights/cache
      INFERENCE_CALAMARI_NUM_PROCESSES: "1"
      INFERENCE_WORKER_RUNNING_JOB_TIMEOUT_SECONDS: "1800"
    volumes:
      - ./inference/weights:/app/inference/weights
      - ./src/hf:/app/src/hf
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: python -m inference.jobs.worker

  frontend:
    build:
      context: ./nomicous
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        APP_VERSION: ${NOMICOUS_VERSION:-0.3.3}
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_DEV_PROXY_TARGET: http://api:8000
    command: sh -c "rm -rf node_modules/.vite && npm run dev -- --host 0.0.0.0 --force"
    volumes:
      - ./nomicous/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
