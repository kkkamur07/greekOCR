name: nomicous

x-api-build: &api-build
  context: .
  dockerfile: nomicous/Dockerfile
  args:
    APP_VERSION: ${NOMICOUS_VERSION:-0.3.2}

x-inference-build: &inference-build
  context: .
  dockerfile: inference/Dockerfile

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-kalamos}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kalamos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: nomicous-api:latest
    build: *api-build
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      MIGRATOR_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      JWT_SECRET: ${JWT_SECRET:?copy .env.compose.example to .env and set JWT_SECRET}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      MEDIA_ROOT: /app/backend/media
      NOMICOUS_APP_ROOT: /app
      CLOUD_INFERENCE_ENABLED: "true"
      INFERENCE_URL: http://inference-api:8001
      INFERENCE_WEBHOOK_SECRET: ${INFERENCE_WEBHOOK_SECRET:?copy .env.compose.example to .env and set INFERENCE_WEBHOOK_SECRET}
      # API hosts remain request/response only; Compose runs platform-worker separately.
      JOB_WORKER_ENABLED: "false"
      JOB_SSE_NOTIFICATIONS_ENABLED: "false"
      ANNOTATED_DATA_ROOT: /data/annotated/data
    volumes:
      - ./nomicous/backend/media:/app/backend/media
      - ./nomicous/backend:/app/backend
      - ./scripts/platform:/app/scripts/platform
      - ./inference:/app/inference
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      inference-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s
    command: >
      sh -c "alembic -c infrastructure/alembic.ini upgrade head
      && python scripts/platform/seed_dev_nomicous.py
      && uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload --reload-dir /app/backend"
    # Seed runs on API container start only (never restarts Postgres). If you wipe or
    # recreate the DB volume while the API keeps running, hit /health or restart api —
    # development health checks recreate the dev login user when it is missing.

  platform-worker:
    image: nomicous-api:latest
    build: *api-build
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      INFERENCE_URL: http://inference-api:8001
      INFERENCE_SERVICE_SECRET: ${INFERENCE_SERVICE_SECRET:?copy .env.compose.example to .env and set INFERENCE_SERVICE_SECRET}
      JOB_WORKER_ENABLED: "true"
      JOB_SSE_NOTIFICATIONS_ENABLED: "false"
    volumes:
      - ./nomicous/backend:/app/backend
      - ./inference:/app/inference
    depends_on:
      db:
        condition: service_healthy
      inference-api:
        condition: service_healthy
    command: python -m backend.jobs.worker_main

  inference-api:
    image: nomicous-inference:latest
    build: *inference-build
    # Host port 8001 is reserved for the local Inference helper (the browser probes
    # http://127.0.0.1:8001 directly — see docs/deployment/supabase.md). Publish the cloud
    # inference API on 8010 so it never shadows a locally installed helper. The
    # container still listens on 8001, so INFERENCE_URL (docker network) is unchanged.
    ports:
      - "127.0.0.1:8010:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      INFERENCE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      INFERENCE_CALLBACK_URL: http://api:8000/internal/inference/job-complete
      INFERENCE_REGISTRY_PATH: /app/inference/registry.yaml
      INFERENCE_SERVICE_SECRET: ${INFERENCE_SERVICE_SECRET:?copy .env.compose.example to .env and set INFERENCE_SERVICE_SECRET}
      HF_CACHE_ROOT: /app/src/hf/cache
      INFERENCE_CALAMARI_NUM_PROCESSES: "1"
    volumes:
      - ./src/hf:/app/src/hf
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    command: uvicorn inference.api.main:app --host 0.0.0.0 --port 8001 --workers 1

  inference-worker:
    image: nomicous-inference:latest
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      INFERENCE_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?copy .env.compose.example to .env and set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-kalamos}
      INFERENCE_CALLBACK_URL: http://api:8000/internal/inference/job-complete
      INFERENCE_REGISTRY_PATH: /app/inference/registry.yaml
      INFERENCE_WEBHOOK_SECRET: ${INFERENCE_WEBHOOK_SECRET:?copy .env.compose.example to .env and set INFERENCE_WEBHOOK_SECRET}
      HF_CACHE_ROOT: /app/src/hf/cache
      INFERENCE_CALAMARI_NUM_PROCESSES: "1"
      INFERENCE_WORKER_RUNNING_JOB_TIMEOUT_SECONDS: "1800"
    volumes:
      - ./src/hf:/app/src/hf
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: python -m inference.jobs.worker

  frontend:
    image: nomicous-frontend:latest
    build:
      context: ./nomicous
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        APP_VERSION: ${NOMICOUS_VERSION:-0.3.2}
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    command: npm run dev -- --hostname 0.0.0.0
    volumes:
      - ./nomicous/frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  frontend_node_modules:
